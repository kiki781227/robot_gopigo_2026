# ═══════════════════════════════════════════════════════════════════════════
# Configuration Robot GoPiGo3 (raspi-200)
# ═══════════════════════════════════════════════════════════════════════════

gopigo_driver_node:
  ros__parameters:
    wheel_base:       0.1116
    wheel_radius:     0.03325
    ticks_per_meter:  1655
    max_dps:          500
    min_dps:          0
    cmd_timeout:      0.5
    odom_rate:        20.0
    invert_motors:    true
    swap_motors:      true
    servo_port:       1


camera_node:
  ros__parameters:
    width:           640
    height:          480
    fps:             30
    device_index:    0
    
    wb_temperature:  4500
    auto_wb:         false
    
    auto_exposure:   true
    exposure_value:  5000
    
    software_wb_enabled:  true
    software_wb_strength: 0.7


debug_server:
  ros__parameters:
    port:         8080
    host:         "0.0.0.0"
    jpeg_quality: 70


aruco_detector_node:
  ros__parameters:
    marker_size_m:   0.054
    focal_length_px: 730.0
    dictionary:      "DICT_4X4_50"


cube_detector_node:
  ros__parameters:
    hsv_blue:   [95,  110, 50,  130, 255, 255]
    hsv_green:  [45,  80,  50,  85,  255, 255]
    hsv_red1:   [0,   100, 90,  10,  255, 255]
    hsv_red2:   [165, 100, 90,  179, 255, 255]
    hsv_yellow: [20,  60,  60,  50,  255, 255]
    
    min_area:                    400
    max_area:                    40000
    crop_top_ratio:              0.5
    aruco_filter_enabled:        true
    aruco_exclusion_radius_px:   200
    distance_K:                  5.0
    log_every_n_frames:          30


mission_node:
  ros__parameters:
    # ── Vitesses ──────────────────────────────────────────────────────
    search_rotation_speed:    0.4
    approach_linear_speed:    0.15
    approach_deposit_speed:   0.10
    backup_speed:             0.15

    # ── Centrage ──────────────────────────────────────────────────────
    cube_centering_gain:      0.003
    aruco_centering_gain:     0.005
    centering_threshold:      20

    # ── Détection ─────────────────────────────────────────────────────
    detection_stable_frames:  3
    detection_lost_frames:    15

    # ── Rotation pulsée pendant CHERCHER ──────────────────────────────
    rotation_mode:            "pulsed"
    pulse_rotation_duration:  0.4
    pulse_pause_duration:     0.6

    # ── Distances et seuils ───────────────────────────────────────────
    deposit_stop_distance:    0.22
    cube_approach_min_area:   4000
    backup_distance:          0.25

    # ── Timeouts ──────────────────────────────────────────────────────
    timeout_chercher_cube:    60.0
    timeout_chercher_depot:   60.0
    timeout_approcher:        30.0

    # ── Durées d'actions bloquantes ───────────────────────────────────
    approach_blind_duration:  3.0
    grab_settle_duration:     1.5       # legacy
    grab_duration:            1.5
    release_duration:         1.5
    
    # ── NOUVEAU : retour au centre après saisie ──────────────────────
    retour_centre_duration:   3.0       # marche arrière post-SAISIR

    # ── Servo ─────────────────────────────────────────────────────────
    servo_angle_open:         90
    servo_angle_close:        180

    # ── Couleur → ArUco ID ────────────────────────────────────────────
    color_to_aruco_id.rouge:  0
    color_to_aruco_id.jaune:  0
    color_to_aruco_id.bleu:   2
    color_to_aruco_id.vert:   2

    # ── Couleurs ignorées ─────────────────────────────────────────────
    ignored_colors:           ["vert"]

    # ── Sécurités ─────────────────────────────────────────────────────
    max_cycles:               10
    state_machine_rate:       20.0
